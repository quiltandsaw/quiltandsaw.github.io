<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Thicket Quilt & Saw</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #333;
      background: url('images/stitch-background.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(255, 255, 255, 0.92);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 10px;
    }

    header img {
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    p.tagline {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .gallery-item {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
    }

    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .gallery-item h3 {
      margin: 10px 0;
      font-size: 18px;
    }

    .links {
      text-align: center;
      padding: 30px;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }

    .links a:hover {
      background: #555;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="overlay">

    <header>
      <img src="images/hidden-thicket-logo-transparent.png" alt="Hidden Thicket Quilt & Saw Logo">
      <h1>Hidden Thicket Quilt & Saw</h1>
      <p class="tagline">
        Custom longarm quilting, pattern design, and woodworking — based in Wasilla, Alaska.
      </p>
    </header>

    <section class="gallery">

      <div class="gallery-item">
        <img src="images/longarm-quilting.jpg" alt="Longarm Quilting">
        <h3>Longarm Quilting</h3>
      </div>

      <div class="gallery-item">
        <img src="images/quilt-detail.jpg" alt="E2E Stitches">
        <h3>E2E Stitches</h3>
      </div>

      <div class="gallery-item">
        <img src="images/pattern-workflow.jpg" alt="Custom Design">
        <h3>Custom Design</h3>
      </div>

      <div class="gallery-item">
        <img src="images/quilt-detail.jpg" alt="Quilt Detail">
        <h3>Quilt Detail</h3>
      </div>

      <div class="gallery-item">
        <img src="images/quilt-studio.jpg" alt="Quilt Studio">
        <h3>Quilt Studio</h3>
      </div>

      <div class="gallery-item">
        <img src="images/woodshop.jpg" alt="Workshop">
        <h3>Workshop</h3>
      </div>

    </section>

    <div class="links">
      <a href="https://www.etsy.com/shop/quiltandsaw" target="_blank">Shop Patterns</a>
      <a href="https://www.facebook.com/quiltandsaw" target="_blank">Follow on Facebook</a>
    </div>

    <footer>
      © Hidden Thicket Quilt & Saw
    </footer>

  </div>
</body>
</html>
